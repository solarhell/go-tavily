# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
language: zh-CN
reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  auto_review:
    enabled: true
    drafts: false
  tools:
    golangci-lint:
      enabled: true
    gitleaks:
      enabled: true
    actionlint:
      enabled: true
    yamllint:
      enabled: true
    github-checks:
      enabled: true
    languagetool:
      enabled: true
chat:
  auto_reply: true
